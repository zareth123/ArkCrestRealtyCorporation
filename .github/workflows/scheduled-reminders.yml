name: Scheduled Reminders

on:
  schedule:
    - cron: '0 22 * * *'   # 6 AM PHT (UTC+8) = 10 PM UTC
    - cron: '0 0 * * *'    # 8 AM PHT = 12 AM UTC
    - cron: '0 9 * * *'    # 5 PM PHT = 9 AM UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  run-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger event reminders via HTTP
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/run-reminders" \
            -H "Authorization: Bearer ${{ secrets.SCHEDULER_SECRET }}" \
            -H "Content-Type: application/json"
